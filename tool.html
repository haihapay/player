<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Tool Clean</title>

<link rel="stylesheet" href="/css/style.css">

<style>

.result-row{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.result-row input{
    flex:1;
}

@media(max-width:768px){

.result-row{
    flex-direction:column;
}

.result-row button{
    width:100%;
}

}

</style>

</head>

<body class="tool-page">

<div class="box">

<h2>🎬 Video Tool (Clean)</h2>

<input id="mp4" placeholder="MP4 URL">

<input id="img" placeholder="Poster URL (optional)">

<div style="margin:15px 0;">

<button id="btnGen">Generate</button>

<button id="btnCopy">Copy Embed</button>

<button id="btnReset">Reset</button>

</div>

<textarea
id="output"
rows="12"
readonly
placeholder="Embed Code"></textarea>

<div class="result-row">

<input
id="resultLink"
readonly
placeholder="Generated Player Link">

<button id="btnCopyLink">
Copy Link
</button>

</div>

</div>

<script src="/videos/tool.js"></script>

</body>
</html>
